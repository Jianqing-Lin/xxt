<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Autumn-xxt WebUI</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
    header { background: #111827; color: #fff; padding: 16px 24px; }
    main { max-width: 1100px; margin: 24px auto; padding: 0 16px; display: grid; gap: 16px; }
    section { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 6px 20px rgba(15, 23, 42, .08); }
    h2 { margin-top: 0; font-size: 18px; }
    label { display: block; margin: 10px 0 6px; font-weight: 600; }
    input, select, textarea { width: 100%; box-sizing: border-box; padding: 9px 10px; border: 1px solid #d1d5db; border-radius: 8px; }
    textarea { min-height: 70px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
    button { border: 0; border-radius: 8px; background: #2563eb; color: white; padding: 10px 14px; cursor: pointer; font-weight: 700; }
    button.secondary { background: #4b5563; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .courses { display: grid; gap: 8px; max-height: 320px; overflow: auto; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; }
    .course { display: flex; gap: 8px; align-items: flex-start; padding: 8px; border-radius: 8px; background: #f9fafb; }
    .log { background: #020617; color: #d1fae5; border-radius: 8px; padding: 12px; height: 360px; overflow: auto; white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 13px; }
    .status { color: #2563eb; font-weight: 700; }
    .hint { color: #6b7280; font-size: 13px; margin-top: 6px; }
    @media (max-width: 800px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header>
  <h1>Autumn-xxt WebUI</h1>
</header>
<main>
  <section>
    <h2>账号与课程</h2>
    <div class="row">
      <div>
        <label>账号</label>
        <input id="username" autocomplete="username" />
      </div>
      <div>
        <label>密码</label>
        <input id="password" type="password" autocomplete="current-password" />
      </div>
    </div>
    <div class="actions">
      <button id="loadCourses">获取课程</button>
      <button class="secondary" id="selectAll">全选课程</button>
      <button class="secondary" id="clearAll">清空选择</button>
    </div>
    <p>课程状态：<span class="status" id="courseStatus">未加载</span></p>
    <div class="courses" id="courses"></div>
  </section>

  <section>
    <h2>任务配置</h2>
    <div class="row">
      <div>
        <label>模式</label>
        <select id="mode">
          <option value="study">刷课</option>
          <option value="collect">收录题库</option>
        </select>
      </div>
      <div>
        <label>倍速</label>
        <input id="speed" type="number" min="0.25" max="16" step="0.25" value="1" />
      </div>
    </div>
    <div class="row">
      <div>
        <label>题库 URL</label>
        <input id="tikuUrl" value="http://localhost:8060/adapter-service/search" />
        <div class="hint">本地适配器可保留默认地址；第三方接口请填写服务地址。</div>
      </div>
      <div>
        <label>题库 Provider / use</label>
        <select id="tikuUse">
          <option value="local">本地题库 local</option>
          <option value="TikuAdapter" selected>TikuAdapter</option>
          <option value="TikuYanxi">言溪题库 TikuYanxi</option>
          <option value="TikuLike">LIKE 知识库 TikuLike</option>
          <option value="AI">AI 兼容接口</option>
          <option value="SiliconFlow">硅基流动 SiliconFlow</option>
          <option value="custom">自定义 Provider</option>
        </select>
      </div>
    </div>
    <div class="row" id="customProviderRow" style="display:none">
      <div>
        <label>自定义 Provider / use</label>
        <input id="customTikuUse" placeholder="例如 customProvider" />
      </div>
      <div></div>
    </div>
    <div id="thirdPartyTokenBox">
      <label>第三方接口 Token</label>
      <input id="thirdPartyToken" placeholder="填写 token；本地题库可留空" />
      <div class="hint">选择第三方接口时会自动生成 Token JSON：<code>{"token":"..."}</code></div>
    </div>
    <label>题库 Token JSON（高级，可选）</label>
    <textarea id="tikuTokens" placeholder='{"token":"xxx"}'>{}</textarea>
    <div class="hint">
      普通场景只填上面的“第三方接口 Token”即可；这里用于高级参数，例如
      <code>{"token":"xxx"}</code>、<code>{"icodefToken":"xxx","buguakeToken":"yyy"}</code>。
      后端会原样作为题库请求参数传入。
    </div>
    <div class="actions">
      <button id="startTask">启动任务</button>
    </div>
    <p>任务状态：<span class="status" id="taskStatus">未启动</span></p>
  </section>

  <section>
    <h2>运行日志</h2>
    <div class="log" id="logs"></div>
  </section>
</main>
<script>
const $ = id => document.getElementById(id);
let courses = [];
let taskId = null;
let timer = null;
const thirdPartyProviders = new Set(['TikuAdapter', 'TikuYanxi', 'TikuLike', 'AI', 'SiliconFlow', 'custom']);

function selectedIndexes() {
  return [...document.querySelectorAll('.course input:checked')].map(x => Number(x.value));
}

function providerValue() {
  return $('tikuUse').value === 'custom' ? $('customTikuUse').value.trim() : $('tikuUse').value;
}

function syncProviderUi() {
  const provider = $('tikuUse').value;
  $('customProviderRow').style.display = provider === 'custom' ? 'grid' : 'none';
  $('thirdPartyTokenBox').style.display = thirdPartyProviders.has(provider) && provider !== 'local' ? 'block' : 'none';
  if (provider === 'local') {
    $('tikuTokens').value = '{}';
  } else if ($('thirdPartyToken').value.trim()) {
    $('tikuTokens').value = JSON.stringify({ token: $('thirdPartyToken').value.trim() }, null, 2);
  }
}

function renderCourses(items) {
  courses = items || [];
  $('courses').innerHTML = courses.map((c, i) => `
    <label class="course">
      <input type="checkbox" value="${i}" />
      <span>${i}. ${c.classid} - ${c.name || ''} - ${c.teacher || ''}</span>
    </label>
  `).join('');
}

function appendLog(lines) {
  $('logs').textContent = (lines || []).join('\n');
  $('logs').scrollTop = $('logs').scrollHeight;
}

async function postJson(url, data) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  return await res.json();
}

$('tikuUse').onchange = syncProviderUi;
$('thirdPartyToken').oninput = syncProviderUi;

$('loadCourses').onclick = async () => {
  $('courseStatus').textContent = '加载中...';
  const data = await postJson('/api/courses/list', {
    username: $('username').value,
    password: $('password').value
  });
  renderCourses(data.courses || []);
  $('courseStatus').textContent = data.result ? `已加载 ${data.courses.length} 门课程` : '加载失败';
};

$('selectAll').onclick = () => document.querySelectorAll('.course input').forEach(x => x.checked = true);
$('clearAll').onclick = () => document.querySelectorAll('.course input').forEach(x => x.checked = false);

$('startTask').onclick = async () => {
  syncProviderUi();
  let tokens = {};
  try { tokens = JSON.parse($('tikuTokens').value || '{}'); } catch (e) { alert('题库 Token JSON 格式错误'); return; }
  const data = await postJson('/api/tasks/start', {
    username: $('username').value,
    password: $('password').value,
    course_indexes: selectedIndexes(),
    mode: $('mode').value,
    speed: Number($('speed').value || 1),
    tiku_url: $('tikuUrl').value,
    tiku_use: providerValue(),
    tiku_tokens: tokens
  });
  taskId = data.task_id;
  $('taskStatus').textContent = `${data.status} (${taskId})`;
  if (timer) clearInterval(timer);
  timer = setInterval(pollTask, 1500);
  await pollTask();
};

async function pollTask() {
  if (!taskId) return;
  const status = await fetch(`/api/tasks/${taskId}`).then(r => r.json());
  $('taskStatus').textContent = `${status.status} (${taskId})`;
  const logs = await fetch(`/api/tasks/${taskId}/logs`).then(r => r.json());
  appendLog(logs.logs || []);
  if (['success', 'failed', 'not_found'].includes(status.status) && timer) {
    clearInterval(timer);
    timer = null;
  }
}

syncProviderUi();
</script>
</body>
</html>
