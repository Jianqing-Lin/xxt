<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Autumn-xxt WebUI</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
    header { background: #111827; color: #fff; padding: 16px 24px; }
    main { max-width: 1200px; margin: 24px auto; padding: 0 16px; display: grid; gap: 16px; }
    section { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 6px 20px rgba(15, 23, 42, .08); }
    h2 { margin-top: 0; font-size: 18px; }
    label { display: block; margin: 10px 0 6px; font-weight: 600; }
    input, select, textarea { width: 100%; box-sizing: border-box; padding: 9px 10px; border: 1px solid #d1d5db; border-radius: 8px; }
    textarea { min-height: 70px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
    button { border: 0; border-radius: 8px; background: #2563eb; color: white; padding: 10px 14px; cursor: pointer; font-weight: 700; }
    button.secondary { background: #4b5563; }
    button.danger { background: #dc2626; }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #e5e7eb; padding: 8px; text-align: left; vertical-align: top; }
    .tabs { display: flex; gap: 10px; flex-wrap: wrap; }
    .tab { background: #374151; }
    .tab.active { background: #2563eb; }
    .page { display: none; }
    .page.active { display: grid; gap: 16px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .courses { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; max-height: 420px; overflow: auto; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; }
    .course { display: grid; grid-template-columns: auto 1fr; gap: 8px; align-items: flex-start; padding: 10px; border-radius: 10px; background: #f9fafb; border: 1px solid #e5e7eb; }
    .course-title { font-weight: 800; margin-bottom: 4px; }
    .course-meta { color: #6b7280; font-size: 12px; line-height: 1.6; }
    .check-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
    .check-row label { display: inline-flex; align-items: center; gap: 6px; margin: 8px 0 0; font-weight: 500; }
    .check-row input { width: auto; }
    .log { background: #020617; color: #d1fae5; border-radius: 8px; padding: 12px; height: 360px; overflow: auto; white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 13px; }
    .status { color: #2563eb; font-weight: 700; }
    .hint { color: #6b7280; font-size: 13px; margin-top: 6px; }
    .full-text { max-width: 520px; white-space: pre-wrap; word-break: break-word; }
    .answer-text { max-width: 320px; white-space: pre-wrap; word-break: break-word; color: #065f46; font-weight: 700; }
    @media (max-width: 800px) { .row { grid-template-columns: 1fr; } .courses { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header><h1>Autumn-xxt WebUI</h1></header>
<main>
  <div class="tabs"><button class="tab active" data-page="studyPage">刷课 / 收录</button><button class="tab" data-page="tikuPage">题库管理</button></div>

  <div id="studyPage" class="page active">
    <section>
      <h2>账号与课程</h2>
      <div class="row"><div><label>账号</label><input id="username" autocomplete="username" /></div><div><label>密码</label><input id="password" type="password" autocomplete="current-password" /></div></div>
      <div class="actions"><button id="loadCourses">获取课程</button><button class="secondary" id="selectAll">全选课程</button><button class="secondary" id="clearAll">清空选择</button></div>
      <p>课程状态：<span class="status" id="courseStatus">未加载</span></p>
      <div class="courses" id="courses"></div>
    </section>

    <section>
      <h2>任务配置</h2>
      <div class="row"><div><label>模式</label><select id="mode"><option value="study">刷课</option><option value="collect">收录题库</option></select></div><div><label>倍速</label><input id="speed" type="number" min="0.25" max="16" step="0.25" value="1" /></div></div>
      <div id="collectSourceBox">
        <label>收录范围</label>
        <div class="check-row">
          <label><input type="checkbox" class="collect-source" value="chapter_quiz" checked /> 章节测验 / 课后测验</label>
          <label><input type="checkbox" class="collect-source" value="homework" checked /> 作业</label>
          <label><input type="checkbox" class="collect-source" value="exam" checked /> 考试</label>
          <label><input type="checkbox" class="collect-source" value="unknown" checked /> 未识别</label>
        </div>
        <div class="hint">仅在“收录题库”模式生效；不勾选的题型来源会跳过。</div>
      </div>
      <div class="row">
        <div><label>题库 URL</label><input id="tikuUrl" value="http://localhost:8060/adapter-service/search" /><div class="hint">本地适配器可保留默认地址；第三方接口请填写服务地址。</div></div>
        <div><label>题库 Provider / use</label><select id="tikuUse"><option value="local">本地题库 local</option><option value="TikuAdapter" selected>TikuAdapter</option><option value="TikuYanxi">言溪题库 TikuYanxi</option><option value="TikuLike">LIKE 知识库 TikuLike</option><option value="AI">AI 兼容接口</option><option value="SiliconFlow">硅基流动 SiliconFlow</option><option value="custom">自定义 Provider</option></select></div>
      </div>
      <div class="row" id="customProviderRow" style="display:none"><div><label>自定义 Provider / use</label><input id="customTikuUse" placeholder="例如 customProvider" /></div><div></div></div>
      <div id="thirdPartyTokenBox"><label>第三方接口 Token</label><input id="thirdPartyToken" placeholder="填写 token；本地题库可留空" /><div class="hint">选择第三方接口时会自动生成 Token JSON：<code>{"token":"..."}</code></div></div>
      <label>题库 Token JSON（高级，可选）</label><textarea id="tikuTokens" placeholder='{"token":"xxx"}'>{}</textarea>
      <div class="hint">普通场景只填上面的“第三方接口 Token”即可；这里用于高级参数，例如 <code>{"token":"xxx"}</code>、<code>{"icodefToken":"xxx","buguakeToken":"yyy"}</code>。</div>
      <div class="actions"><button id="startTask">启动任务</button></div>
      <p>任务状态：<span class="status" id="taskStatus">未启动</span></p>
    </section>

    <section><h2>运行日志</h2><div class="log" id="logs"></div></section>
  </div>

  <div id="tikuPage" class="page">
    <section>
      <h2>题库管理</h2>
      <div class="row"><div><label>题目</label><textarea id="manualQuestion" placeholder="输入题目"></textarea></div><div><label>答案</label><textarea id="manualAnswer" placeholder="输入答案；单选/多选可填 A 或 AB"></textarea></div></div>
      <div class="row"><div><label>题型</label><select id="manualType"><option value="0">单选</option><option value="1">多选</option><option value="2">填空</option><option value="3">判断</option><option value="4" selected>简答/其他</option></select></div><div><label>来源类型</label><select id="manualSourceKind"><option value="manual" selected>手动</option><option value="homework">作业</option><option value="chapter_quiz">课后/章节测验</option><option value="exam">考试</option><option value="unknown">未知</option></select></div></div>
      <label>选项 JSON（可选）</label><textarea id="manualOptions" placeholder='["A. 选项1","B. 选项2"]'>[]</textarea>
      <div class="actions"><button id="addTiku">增加题库</button><button class="secondary" id="refreshTiku">刷新列表</button></div>
      <p>题库状态：<span class="status" id="tikuStatus">未加载</span></p>
      <div style="overflow:auto"><table><thead><tr><th>ID</th><th>题型</th><th>来源</th><th>题目 / 选项</th><th>答案</th><th>操作</th></tr></thead><tbody id="tikuRows"></tbody></table></div>
    </section>
  </div>
</main>
<script>
const $ = id => document.getElementById(id);
let courses = [];
let taskId = null;
let timer = null;
const thirdPartyProviders = new Set(['TikuAdapter', 'TikuYanxi', 'TikuLike', 'AI', 'SiliconFlow', 'custom']);
function selectedIndexes() { return [...document.querySelectorAll('.course input:checked')].map(x => Number(x.value)); }
function selectedCollectSources() { return [...document.querySelectorAll('.collect-source:checked')].map(x => x.value); }
function providerValue() { return $('tikuUse').value === 'custom' ? $('customTikuUse').value.trim() : $('tikuUse').value; }
function syncProviderUi() { const provider = $('tikuUse').value; $('customProviderRow').style.display = provider === 'custom' ? 'grid' : 'none'; $('thirdPartyTokenBox').style.display = thirdPartyProviders.has(provider) && provider !== 'local' ? 'block' : 'none'; if (provider === 'local') $('tikuTokens').value = '{}'; else if ($('thirdPartyToken').value.trim()) $('tikuTokens').value = JSON.stringify({ token: $('thirdPartyToken').value.trim() }, null, 2); }
function syncModeUi() { $('collectSourceBox').style.display = $('mode').value === 'collect' ? 'block' : 'none'; }
function renderCourses(items) {
  courses = items || [];
  $('courses').innerHTML = courses.map((c, i) => `<label class="course"><input type="checkbox" value="${i}" /><span><div class="course-title">${escapeHtml(c.name || '未命名课程')}</div><div class="course-meta">序号：${i}<br>教师：${escapeHtml(c.teacher || '未知')}<br>classid：${escapeHtml(c.classid)}<br>courseid：${escapeHtml(c.courseid)}<br>cpi：${escapeHtml(c.cpi)}</div></span></label>`).join('');
}
function appendLog(lines) { $('logs').textContent = (lines || []).join('\n'); $('logs').scrollTop = $('logs').scrollHeight; }
async function postJson(url, data) { const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) }); return await res.json(); }
for (const tab of document.querySelectorAll('.tab')) { tab.onclick = () => { document.querySelectorAll('.tab').forEach(x => x.classList.remove('active')); document.querySelectorAll('.page').forEach(x => x.classList.remove('active')); tab.classList.add('active'); $(tab.dataset.page).classList.add('active'); if (tab.dataset.page === 'tikuPage') loadTiku(); }; }
$('mode').onchange = syncModeUi;
$('tikuUse').onchange = syncProviderUi;
$('thirdPartyToken').oninput = syncProviderUi;
$('loadCourses').onclick = async () => { $('courseStatus').textContent = '加载中...'; const data = await postJson('/api/courses/list', { username: $('username').value, password: $('password').value }); renderCourses(data.courses || []); $('courseStatus').textContent = data.result ? `已加载 ${data.courses.length} 门课程` : '加载失败'; };
$('selectAll').onclick = () => document.querySelectorAll('.course input').forEach(x => x.checked = true);
$('clearAll').onclick = () => document.querySelectorAll('.course input').forEach(x => x.checked = false);
$('startTask').onclick = async () => { syncProviderUi(); let tokens = {}; try { tokens = JSON.parse($('tikuTokens').value || '{}'); } catch (e) { alert('题库 Token JSON 格式错误'); return; } const data = await postJson('/api/tasks/start', { username: $('username').value, password: $('password').value, course_indexes: selectedIndexes(), mode: $('mode').value, speed: Number($('speed').value || 1), tiku_url: $('tikuUrl').value, tiku_use: providerValue(), tiku_tokens: tokens, collect_sources: selectedCollectSources() }); taskId = data.task_id; $('taskStatus').textContent = `${data.status} (${taskId})`; if (timer) clearInterval(timer); timer = setInterval(pollTask, 1500); await pollTask(); };
async function pollTask() { if (!taskId) return; const status = await fetch(`/api/tasks/${taskId}`).then(r => r.json()); $('taskStatus').textContent = `${status.status} (${taskId})`; const logs = await fetch(`/api/tasks/${taskId}/logs`).then(r => r.json()); appendLog(logs.logs || []); if (['success', 'failed', 'not_found'].includes(status.status) && timer) { clearInterval(timer); timer = null; } }
function parseOptionsText(item) { try { const arr = JSON.parse(item.options_json || '[]'); return Array.isArray(arr) && arr.length ? '\n选项：\n' + arr.join('\n') : ''; } catch (e) { return ''; } }
async function loadTiku() { $('tikuStatus').textContent = '加载中...'; const data = await fetch('/api/tiku/answers?limit=100').then(r => r.json()); $('tikuRows').innerHTML = (data.items || []).map(item => `<tr><td>${item.id}</td><td>${escapeHtml(item.type_code)}</td><td>${escapeHtml(item.source_kind)}</td><td class="full-text">${escapeHtml(item.question + parseOptionsText(item))}</td><td class="answer-text">${escapeHtml(item.answer_text || item.answer)}</td><td><button class="danger" onclick="deleteTiku(${item.id})">删除</button></td></tr>`).join(''); $('tikuStatus').textContent = `已加载 ${(data.items || []).length} 条`; }
$('refreshTiku').onclick = loadTiku;
$('addTiku').onclick = async () => { let options = []; try { options = JSON.parse($('manualOptions').value || '[]'); } catch (e) { alert('选项 JSON 格式错误'); return; } await postJson('/api/tiku/answers', { question: $('manualQuestion').value, answer: $('manualAnswer').value, answer_text: $('manualAnswer').value, type_code: $('manualType').value, source_kind: $('manualSourceKind').value, options }); $('manualQuestion').value = ''; $('manualAnswer').value = ''; await loadTiku(); };
async function deleteTiku(id) { if (!confirm(`确认删除题库记录 ${id}？`)) return; await fetch(`/api/tiku/answers/${id}`, { method: 'DELETE' }); await loadTiku(); }
function escapeHtml(value) { const div = document.createElement('div'); div.textContent = String(value || ''); return div.innerHTML; }
syncProviderUi(); syncModeUi();
</script>
</body>
</html>
